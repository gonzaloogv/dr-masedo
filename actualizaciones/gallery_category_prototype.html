
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  .gallery-root {
    background: #0e1f1a;
    min-height: 520px;
    padding: 2rem;
    font-family: var(--font-sans);
    overflow: hidden;
  }

  .stage {
    display: flex;
    height: 440px;
    gap: 0;
    position: relative;
  }

  .categories-panel {
    display: flex;
    gap: 8px;
    width: 100%;
    transition: width 0.55s cubic-bezier(0.23,1,0.32,1), opacity 0.4s ease;
    flex-shrink: 0;
  }

  .categories-panel.collapsed {
    width: 200px;
    flex-shrink: 0;
  }

  .cat-card {
    flex: 1;
    border-radius: 4px;
    overflow: hidden;
    cursor: pointer;
    position: relative;
    transition: flex 0.55s cubic-bezier(0.23,1,0.32,1);
    min-width: 0;
  }

  .cat-card.selected {
    flex: 0 0 180px;
  }

  .cat-bg {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.3s ease;
  }

  .cat-card:nth-child(1) .cat-bg { background: #1c3a30; }
  .cat-card:nth-child(2) .cat-bg { background: #2a2a1c; }
  .cat-card:nth-child(3) .cat-bg { background: #1c2a3a; }
  .cat-card:nth-child(4) .cat-bg { background: #2a1c2a; }
  .cat-card:nth-child(5) .cat-bg { background: #1c1c2a; }

  .cat-card:hover .cat-bg, .cat-card.selected .cat-bg { filter: brightness(1.2); }

  .cat-placeholder {
    width: 48px;
    height: 48px;
    border: 1.5px dashed rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.25);
    font-size: 20px;
  }

  .cat-info {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 1rem 0.75rem 0.75rem;
    background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 100%);
  }

  .cat-label {
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #7fb89a;
    margin-bottom: 3px;
    opacity: 0;
    transition: opacity 0.3s 0.2s;
  }

  .cat-card:hover .cat-label,
  .cat-card.selected .cat-label { opacity: 1; }

  .cat-name {
    font-size: 13px;
    color: #fff;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    writing-mode: horizontal-tb;
    transition: font-size 0.3s ease;
  }

  .cat-card:not(.selected):not(:hover) .cat-name {
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    font-size: 11px;
    white-space: normal;
    text-overflow: clip;
  }

  .subcats-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
    overflow: hidden;
    opacity: 0;
    width: 0;
    transition: opacity 0.4s ease 0.2s, width 0.55s cubic-bezier(0.23,1,0.32,1);
    margin-left: 0;
  }

  .subcats-panel.visible {
    opacity: 1;
    width: 100%;
    margin-left: 8px;
  }

  .subcats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    height: 100%;
  }

  .sub-card {
    border-radius: 4px;
    overflow: hidden;
    cursor: pointer;
    position: relative;
    background: #1c3a30;
    transition: transform 0.2s ease;
  }

  .sub-card:hover { transform: scale(1.02); }
  .sub-card:hover .sub-overlay { opacity: 1; }
  .sub-card:hover .sub-badge { opacity: 1; }

  .sub-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 8px,
      rgba(255,255,255,0.03) 8px,
      rgba(255,255,255,0.03) 16px
    );
  }

  .sub-placeholder-icon {
    width: 36px;
    height: 36px;
    border: 1.5px dashed rgba(255,255,255,0.15);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.15);
    font-size: 16px;
  }

  .sub-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.55);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.25s ease;
    gap: 6px;
  }

  .sub-open-btn {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #fff;
    border: 1px solid rgba(255,255,255,0.5);
    padding: 6px 14px;
    background: transparent;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    font-family: var(--font-sans);
  }

  .sub-open-btn:hover { background: #b87c4c; border-color: #b87c4c; }

  .sub-info {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 0.5rem;
    background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
  }

  .sub-badge {
    position: absolute;
    top: 8px;
    right: 8px;
    background: #b87c4c;
    padding: 3px 8px;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #fff;
    opacity: 0;
    transition: opacity 0.25s ease;
  }

  .sub-name {
    font-size: 11px;
    color: #fff;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .back-btn {
    position: absolute;
    top: -28px;
    left: 0;
    background: none;
    border: none;
    color: #7fb89a;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-sans);
    transition: color 0.2s;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s 0.3s ease;
  }

  .back-btn.visible { opacity: 1; pointer-events: all; }
  .back-btn:hover { color: #fff; }

  .cat-count {
    font-size: 9px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.08em;
    margin-top: 2px;
  }

  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }

  .modal-backdrop.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal-box {
    background: #0e1f1a;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 4px;
    padding: 2rem;
    max-width: 500px;
    width: 90%;
    position: relative;
    transform: scale(0.96);
    transition: transform 0.25s ease;
  }

  .modal-backdrop.open .modal-box { transform: scale(1); }

  .modal-close {
    position: absolute;
    top: 1rem;
    right: 1rem;
    background: none;
    border: none;
    color: rgba(255,255,255,0.5);
    font-size: 22px;
    cursor: pointer;
    line-height: 1;
  }

  .modal-close:hover { color: #fff; }

  .modal-cat-label {
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #7fb89a;
    margin-bottom: 6px;
  }

  .modal-title {
    font-size: 22px;
    color: #fff;
    font-weight: 500;
    margin-bottom: 1rem;
  }

  .modal-placeholder {
    width: 100%;
    height: 220px;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 8px,
      rgba(255,255,255,0.03) 8px,
      rgba(255,255,255,0.03) 16px
    );
    border: 1px dashed rgba(255,255,255,0.1);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.2);
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .modal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .modal-nav-btn {
    background: none;
    border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.6);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    transition: background 0.2s, color 0.2s;
  }

  .modal-nav-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

  .modal-counter {
    font-size: 11px;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.4);
  }

  .disclaimer {
    margin-top: 1rem;
    font-size: 10px;
    color: rgba(255,255,255,0.35);
    line-height: 1.6;
  }

  .sub-card:nth-child(1) { background: #1c3a30; }
  .sub-card:nth-child(2) { background: #2a2a1c; }
  .sub-card:nth-child(3) { background: #1c2a3a; }
  .sub-card:nth-child(4) { background: #1a2a20; }
  .sub-card:nth-child(5) { background: #252018; }
  .sub-card:nth-child(6) { background: #18202a; }
</style>

<div class="gallery-root">
  <h2 class="sr-only">Prototipo interactivo de galería por categorías con subcategorías y modal</h2>

  <div style="position: relative; margin-bottom: 2.5rem;">
    <button class="back-btn" id="backBtn" onclick="resetToCategories()">
      <i class="ti ti-arrow-left" aria-hidden="true"></i> Todas las categorías
    </button>
  </div>

  <div class="stage">
    <div class="categories-panel" id="catsPanel">
    </div>

    <div class="subcats-panel" id="subcatsPanel">
      <div class="subcats-grid" id="subcatsGrid"></div>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="modalBackdrop" onclick="handleBackdropClick(event)">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()" aria-label="Cerrar">
      <i class="ti ti-x" aria-hidden="true"></i>
    </button>
    <p class="modal-cat-label" id="modalCatLabel"></p>
    <h3 class="modal-title" id="modalTitle"></h3>
    <div class="modal-placeholder">
      <span>Imagen placeholder</span>
    </div>
    <div class="modal-nav">
      <button class="modal-nav-btn" onclick="navModal(-1)" aria-label="Anterior">
        <i class="ti ti-chevron-left" aria-hidden="true"></i>
      </button>
      <span class="modal-counter" id="modalCounter">1 / 3</span>
      <button class="modal-nav-btn" onclick="navModal(1)" aria-label="Siguiente">
        <i class="ti ti-chevron-right" aria-hidden="true"></i>
      </button>
    </div>
    <p class="disclaimer">Las fotografías se publican con consentimiento informado. Los resultados individuales pueden variar.</p>
  </div>
</div>

<script>
const DATA = [
  {
    id: 'mamas', name: 'Mamas', icon: 'ti-heart',
    subs: [
      { id: 'aumento-mamas', name: 'Aumento de mamas', cases: 4 },
      { id: 'reduccion-mamas', name: 'Reducción de mamas', cases: 2 },
      { id: 'mastopexia', name: 'Mastopexia', cases: 3 },
      { id: 'reconstruccion-mamaria', name: 'Reconstrucción mamaria', cases: 1 },
    ]
  },
  {
    id: 'rostro', name: 'Rostro', icon: 'ti-mood-smile',
    subs: [
      { id: 'rinoplastia', name: 'Rinoplastia', cases: 5 },
      { id: 'blefaroplastia', name: 'Blefaroplastia', cases: 2 },
      { id: 'otoplastia', name: 'Otoplastia', cases: 1 },
      { id: 'lifting', name: 'Lifting', cases: 3 },
      { id: 'pomulos', name: 'Cirugía de pómulos', cases: 2 },
      { id: 'maxilofacial', name: 'Cirugía maxilofacial', cases: 1 },
    ]
  },
  {
    id: 'cuerpo', name: 'Cuerpo', icon: 'ti-user',
    subs: [
      { id: 'abdominoplastia', name: 'Abdominoplastía', cases: 3 },
      { id: 'dermolipectomia', name: 'Dermolipectomía', cases: 2 },
      { id: 'liposuccion', name: 'Liposucción', cases: 2 },
      { id: 'lipoescultura', name: 'Lipoescultura', cases: 4 },
      { id: 'gluteos', name: 'Aumento de glúteos', cases: 2 },
    ]
  },
  {
    id: 'masculina', name: 'Cirugía masculina', icon: 'ti-gender-male',
    subs: [
      { id: 'ginecomastia', name: 'Ginecomastia', cases: 2 },
    ]
  },
  {
    id: 'capilar', name: 'Capilar', icon: 'ti-scissors',
    subs: [
      { id: 'implante-capilar', name: 'Implante capilar', cases: 1 },
    ]
  },
];

let selectedCat = null;
let modalSubcat = null;
let modalImgIndex = 0;

function renderCategories() {
  const panel = document.getElementById('catsPanel');
  panel.innerHTML = DATA.map(cat => `
    <div class="cat-card${selectedCat && selectedCat.id === cat.id ? ' selected' : ''}" 
         onclick="selectCategory('${cat.id}')"
         role="button"
         tabindex="0"
         aria-label="${cat.name}">
      <div class="cat-bg">
        <div class="cat-placeholder">
          <i class="ti ${cat.icon}" aria-hidden="true"></i>
        </div>
      </div>
      <div class="cat-info">
        <p class="cat-label">Categoría</p>
        <p class="cat-name">${cat.name}</p>
        <p class="cat-count">${cat.subs.length} procedimientos</p>
      </div>
    </div>
  `).join('');
}

function renderSubcats(cat) {
  const grid = document.getElementById('subcatsGrid');
  grid.innerHTML = cat.subs.map(sub => `
    <div class="sub-card" 
         onmouseenter="this.querySelector('.sub-overlay').style.opacity='1'; this.querySelector('.sub-badge').style.opacity='1';"
         onmouseleave="this.querySelector('.sub-overlay').style.opacity='0'; this.querySelector('.sub-badge').style.opacity='0';">
      <div class="sub-placeholder">
        <div class="sub-placeholder-icon">
          <i class="ti ti-photo" aria-hidden="true"></i>
        </div>
      </div>
      <div class="sub-badge">${sub.cases} casos</div>
      <div class="sub-overlay">
        <button class="sub-open-btn" onclick="openModal('${cat.id}', '${sub.id}')">
          Ver ${sub.cases} resultado${sub.cases !== 1 ? 's' : ''} →
        </button>
      </div>
      <div class="sub-info">
        <p class="sub-name">${sub.name}</p>
      </div>
    </div>
  `).join('');
}

function selectCategory(catId) {
  selectedCat = DATA.find(c => c.id === catId);
  if (!selectedCat) return;

  renderCategories();
  renderSubcats(selectedCat);

  const catsPanel = document.getElementById('catsPanel');
  const subcatsPanel = document.getElementById('subcatsPanel');
  const backBtn = document.getElementById('backBtn');

  catsPanel.classList.add('collapsed');
  subcatsPanel.classList.add('visible');
  backBtn.classList.add('visible');
}

function resetToCategories() {
  selectedCat = null;
  renderCategories();

  const catsPanel = document.getElementById('catsPanel');
  const subcatsPanel = document.getElementById('subcatsPanel');
  const backBtn = document.getElementById('backBtn');

  catsPanel.classList.remove('collapsed');
  subcatsPanel.classList.remove('visible');
  backBtn.classList.remove('visible');
  document.getElementById('subcatsGrid').innerHTML = '';
}

function openModal(catId, subId) {
  const cat = DATA.find(c => c.id === catId);
  const sub = cat?.subs.find(s => s.id === subId);
  if (!sub) return;

  modalSubcat = sub;
  modalImgIndex = 0;
  document.getElementById('modalCatLabel').textContent = cat.name;
  document.getElementById('modalTitle').textContent = sub.name;
  document.getElementById('modalCounter').textContent = `1 / ${sub.cases}`;
  document.getElementById('modalBackdrop').classList.add('open');
}

function closeModal() {
  document.getElementById('modalBackdrop').classList.remove('open');
  modalSubcat = null;
}

function navModal(dir) {
  if (!modalSubcat) return;
  modalImgIndex = (modalImgIndex + dir + modalSubcat.cases) % modalSubcat.cases;
  document.getElementById('modalCounter').textContent = `${modalImgIndex + 1} / ${modalSubcat.cases}`;
}

function handleBackdropClick(e) {
  if (e.target === document.getElementById('modalBackdrop')) closeModal();
}

renderCategories();
</script>
