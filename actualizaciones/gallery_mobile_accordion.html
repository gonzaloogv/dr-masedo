
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

.phone-frame {
  width: 340px;
  margin: 0 auto;
  background: #111;
  border-radius: 36px;
  border: 6px solid #2a2a2a;
  overflow: hidden;
}

.phone-notch {
  background: #111;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.notch-pill {
  width: 80px;
  height: 10px;
  background: #2a2a2a;
  border-radius: 8px;
}

.screen {
  background: #0e1f1a;
  overflow: hidden;
  position: relative;
}

.screen-scroll {
  overflow-y: auto;
  max-height: 640px;
  padding: 12px 12px 24px;
  scrollbar-width: none;
}

.screen-scroll::-webkit-scrollbar { display: none; }

.section-lbl {
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #7fb89a;
  padding: 4px 2px 10px;
  font-family: var(--font-sans);
}

.acc-item {
  margin-bottom: 6px;
  border-radius: 6px;
  overflow: hidden;
  border: 0.5px solid rgba(127,184,154,0.1);
}

.acc-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 13px 14px;
  cursor: pointer;
  background: #172e25;
  transition: background 0.2s ease;
  user-select: none;
  -webkit-user-select: none;
  border: none;
  width: 100%;
  text-align: left;
}

.acc-header.open { background: #1e3d30; }
.acc-header:active { background: #213f30; }

.acc-icon {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: rgba(127,184,154,0.12);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #7fb89a;
  font-size: 16px;
  flex-shrink: 0;
  transition: background 0.25s ease, color 0.25s ease;
}

.acc-header.open .acc-icon {
  background: rgba(127,184,154,0.22);
  color: #a3d4bb;
}

.acc-text { flex: 1; min-width: 0; }

.acc-name {
  font-size: 13px;
  color: #fff;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-family: var(--font-sans);
}

.acc-count {
  font-size: 10px;
  color: rgba(255,255,255,0.38);
  margin-top: 2px;
  font-family: var(--font-sans);
}

.acc-arrow {
  color: rgba(255,255,255,0.3);
  font-size: 16px;
  flex-shrink: 0;
  transition: transform 0.35s cubic-bezier(0.23,1,0.32,1), color 0.25s ease;
}

.acc-header.open .acc-arrow {
  transform: rotate(180deg);
  color: #7fb89a;
}

.acc-body {
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.45s cubic-bezier(0.23,1,0.32,1);
  background: #0f2318;
}

.acc-body.open {
  max-height: 600px;
}

.acc-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 6px;
  padding: 8px 10px 10px;
}

.sub-card {
  border-radius: 5px;
  overflow: hidden;
  cursor: pointer;
  position: relative;
  background: #1c3a30;
  aspect-ratio: 3/4;
  transition: opacity 0.15s ease;
}

.sub-card:active { opacity: 0.8; }

.sub-card:nth-child(2) { background: #2a2a1c; }
.sub-card:nth-child(3) { background: #1c2a3a; }
.sub-card:nth-child(4) { background: #1a2a20; }
.sub-card:nth-child(5) { background: #252018; }
.sub-card:nth-child(6) { background: #18202a; }

.sub-ph {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: repeating-linear-gradient(
    45deg, transparent, transparent 6px,
    rgba(255,255,255,0.025) 6px, rgba(255,255,255,0.025) 12px
  );
}

.sub-ph-icon {
  width: 26px;
  height: 26px;
  border: 1px dashed rgba(255,255,255,0.12);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(255,255,255,0.12);
  font-size: 12px;
}

.sub-badge {
  position: absolute;
  top: 5px;
  right: 5px;
  background: #b87c4c;
  padding: 2px 6px;
  font-size: 9px;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: #fff;
  border-radius: 2px;
  font-family: var(--font-sans);
}

.sub-info {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 6px 7px 5px;
  background: rgba(0,0,0,0.72);
}

.sub-name {
  font-size: 10px;
  color: #fff;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-family: var(--font-sans);
}

.sub-hint {
  font-size: 9px;
  color: rgba(255,255,255,0.38);
  margin-top: 1px;
  font-family: var(--font-sans);
}

.modal-wrap {
  min-height: 500px;
  background: rgba(0,0,0,0.88);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding-top: 30px;
  display: none;
}

.modal-wrap.open { display: flex; }

.modal-box {
  background: #0a1a13;
  border-radius: 8px;
  border: 0.5px solid rgba(127,184,154,0.15);
  width: 290px;
  overflow: hidden;
}

.modal-top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 14px;
  border-bottom: 0.5px solid rgba(255,255,255,0.06);
}

.modal-close {
  background: none;
  border: none;
  color: rgba(255,255,255,0.5);
  font-size: 18px;
  cursor: pointer;
  padding: 2px;
  line-height: 1;
}

.modal-close:active { color: #fff; }

.modal-counter {
  font-size: 10px;
  letter-spacing: 0.1em;
  color: rgba(255,255,255,0.35);
  font-family: var(--font-sans);
}

.modal-header {
  padding: 10px 14px 8px;
}

.modal-cat-lbl {
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #7fb89a;
  margin-bottom: 3px;
  font-family: var(--font-sans);
}

.modal-title {
  font-size: 16px;
  color: #fff;
  font-weight: 500;
  font-family: var(--font-sans);
}

.modal-img {
  margin: 0 14px;
  aspect-ratio: 3/4;
  max-height: 220px;
  background: repeating-linear-gradient(
    45deg, transparent, transparent 8px,
    rgba(255,255,255,0.025) 8px, rgba(255,255,255,0.025) 16px
  );
  border: 1px dashed rgba(255,255,255,0.08);
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.modal-img-lbl {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: rgba(255,255,255,0.18);
  font-family: var(--font-sans);
}

.modal-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px 8px;
}

.modal-nav-btn {
  background: rgba(255,255,255,0.07);
  border: 0.5px solid rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.55);
  width: 36px;
  height: 36px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}

.modal-nav-btn:active { background: rgba(255,255,255,0.15); color: #fff; }

.modal-swipe {
  font-size: 9px;
  letter-spacing: 0.09em;
  color: rgba(255,255,255,0.28);
  font-family: var(--font-sans);
}

.modal-disclaimer {
  font-size: 9px;
  color: rgba(255,255,255,0.22);
  text-align: center;
  padding: 0 14px 12px;
  line-height: 1.5;
  font-family: var(--font-sans);
}
</style>

<div style="padding: 1rem 0;">
  <h2 class="sr-only">Prototipo mobile de galería con accordion por categorías</h2>

  <div class="phone-frame">
    <div class="phone-notch"><div class="notch-pill"></div></div>
    <div class="screen">

      <div id="mainScreen">
        <div class="screen-scroll">
          <p class="section-lbl">Procedimientos</p>
          <div id="accList"></div>
        </div>
      </div>

      <div class="modal-wrap" id="modalWrap">
        <div class="modal-box">
          <div class="modal-top-bar">
            <button class="modal-close" onclick="closeModal()" aria-label="Cerrar">
              <i class="ti ti-x" aria-hidden="true"></i>
            </button>
            <span class="modal-counter" id="mCounter">1 / 3</span>
          </div>
          <div class="modal-header">
            <p class="modal-cat-lbl" id="mCatLbl"></p>
            <p class="modal-title" id="mTitle"></p>
          </div>
          <div class="modal-img">
            <span class="modal-img-lbl">Imagen placeholder</span>
          </div>
          <div class="modal-nav">
            <button class="modal-nav-btn" onclick="navModal(-1)" aria-label="Anterior">
              <i class="ti ti-chevron-left" aria-hidden="true"></i>
            </button>
            <span class="modal-swipe">
              <i class="ti ti-arrows-left-right" aria-hidden="true" style="font-size:12px;vertical-align:-1px;margin-right:3px;"></i>
              deslizá para navegar
            </span>
            <button class="modal-nav-btn" onclick="navModal(1)" aria-label="Siguiente">
              <i class="ti ti-chevron-right" aria-hidden="true"></i>
            </button>
          </div>
          <p class="modal-disclaimer">Publicadas con consentimiento informado. Los resultados individuales pueden variar.</p>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
const CATS = [
  { id:'mamas', name:'Mamas', icon:'ti-heart', subs:[
    {id:'aumento', name:'Aumento de mamas', cases:4},
    {id:'reduccion', name:'Reducción de mamas', cases:2},
    {id:'mastopexia', name:'Mastopexia', cases:3},
    {id:'reconstruccion', name:'Reconstrucción mamaria', cases:1},
  ]},
  { id:'rostro', name:'Rostro', icon:'ti-mood-smile', subs:[
    {id:'rinoplastia', name:'Rinoplastia', cases:5},
    {id:'blefaroplastia', name:'Blefaroplastia', cases:2},
    {id:'otoplastia', name:'Otoplastia', cases:1},
    {id:'lifting', name:'Lifting', cases:3},
    {id:'pomulos', name:'Cirugía de pómulos', cases:2},
    {id:'maxilofacial', name:'Cirugía maxilofacial', cases:1},
  ]},
  { id:'cuerpo', name:'Cuerpo', icon:'ti-user', subs:[
    {id:'abdominoplastia', name:'Abdominoplastía', cases:3},
    {id:'dermolipectomia', name:'Dermolipectomía', cases:2},
    {id:'liposuccion', name:'Liposucción', cases:2},
    {id:'lipoescultura', name:'Lipoescultura', cases:4},
    {id:'gluteos', name:'Aumento de glúteos', cases:2},
  ]},
  { id:'masculina', name:'Cirugía masculina', icon:'ti-gender-male', subs:[
    {id:'ginecomastia', name:'Ginecomastia', cases:2},
  ]},
  { id:'capilar', name:'Capilar', icon:'ti-scissors', subs:[
    {id:'implante', name:'Implante capilar', cases:1},
  ]},
];

let openCatId = null;
let modalSub = null;
let modalIdx = 0;

function toggleCat(catId) {
  openCatId = openCatId === catId ? null : catId;
  renderAll();

  if (openCatId) {
    requestAnimationFrame(() => {
      const el = document.getElementById('acc-' + openCatId);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });
  }
}

function renderAll() {
  document.getElementById('accList').innerHTML = CATS.map(cat => {
    const isOpen = openCatId === cat.id;
    const subColors = ['#1c3a30','#2a2a1c','#1c2a3a','#1a2a20','#252018','#18202a'];

    const subCards = cat.subs.map((sub, i) => `
      <div class="sub-card" style="background:${subColors[i % subColors.length]}"
           onclick="openModal('${cat.id}','${sub.id}')"
           role="button" tabindex="${isOpen ? 0 : -1}"
           aria-label="${sub.name}">
        <div class="sub-ph">
          <div class="sub-ph-icon">
            <i class="ti ti-photo" aria-hidden="true"></i>
          </div>
        </div>
        <div class="sub-badge">${sub.cases} casos</div>
        <div class="sub-info">
          <p class="sub-name">${sub.name}</p>
          <p class="sub-hint">Toca para ver</p>
        </div>
      </div>
    `).join('');

    return `
      <div class="acc-item" id="acc-${cat.id}">
        <button class="acc-header${isOpen ? ' open' : ''}"
                onclick="toggleCat('${cat.id}')"
                aria-expanded="${isOpen}"
                aria-controls="body-${cat.id}">
          <div class="acc-icon">
            <i class="ti ${cat.icon}" aria-hidden="true"></i>
          </div>
          <div class="acc-text">
            <p class="acc-name">${cat.name}</p>
            <p class="acc-count">${cat.subs.length} procedimiento${cat.subs.length !== 1 ? 's' : ''}</p>
          </div>
          <i class="ti ti-chevron-down acc-arrow" aria-hidden="true"></i>
        </button>
        <div class="acc-body${isOpen ? ' open' : ''}" id="body-${cat.id}" role="region">
          <div class="acc-grid">${subCards}</div>
        </div>
      </div>
    `;
  }).join('');
}

function openModal(catId, subId) {
  const cat = CATS.find(c => c.id === catId);
  const sub = cat?.subs.find(s => s.id === subId);
  if (!sub) return;
  modalSub = sub;
  modalIdx = 0;
  document.getElementById('mCatLbl').textContent = cat.name;
  document.getElementById('mTitle').textContent = sub.name;
  document.getElementById('mCounter').textContent = `1 / ${sub.cases}`;
  document.getElementById('modalWrap').classList.add('open');
  document.getElementById('mainScreen').style.display = 'none';
}

function closeModal() {
  document.getElementById('modalWrap').classList.remove('open');
  document.getElementById('mainScreen').style.display = 'block';
  modalSub = null;
}

function navModal(dir) {
  if (!modalSub) return;
  modalIdx = (modalIdx + dir + modalSub.cases) % modalSub.cases;
  document.getElementById('mCounter').textContent = `${modalIdx + 1} / ${modalSub.cases}`;
}

renderAll();
</script>
